services:
  app:
    build: .
    container_name: laravel
    environment:
      # 1 = pornește Vite în container la start; 0 = doar PHP + build static (manifest)
      RUN_VITE_DEV: "${RUN_VITE_DEV:-1}"
    ports:
      # Vite dev server (npm run dev) — trebuie accesibil din browser pe host
      - "5173:5173"
    volumes:
      - .:/var/www
      # vendor și node_modules în volume Docker (I/O rapid; nu mai trec prin bind mount Windows)
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
    networks:
      - app_network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: nginx_colete
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: mysql_colete
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: parcel_hub
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
