
services:
  app:
    build: .
    container_name: laravel
    volumes:
      - .:/var/www
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_colete
    ports:
      - "8081:80"        # Accesezi site-ul la http://localhost:8080
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    container_name: mysql_colete
    ports:
      - "3307:3306"      # <--- PORTUL ADAUGAT: 3307 pe Windows se leagă de 3306 în Docker
    environment:
      MYSQL_DATABASE: parcel_hub
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data: